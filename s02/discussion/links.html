<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>HTML Hyperlinks</title>
	</head>


	<body>
		<h1>HTML Hyperlinks</h1>

		<p>HTML Hyperlinks are created using the anchor tag.</p>

		<h3>There are two kinds of links:</h3>

		<!-- ul tag used to create bulleted list in your webpage -->
		<ul>
			<li>Absolute Link</li>
			<li>Relative Link</li>
		</ul>

		<div>
			<!-- absolute links are links to pages in other websites. It is used together with the href to define of location or address of the link to be redireted -->
			<h4>Absolute Links</h4>
			<a href="https://zuitt.co/" target="_blank">Zuitt Coding Bootcamp</a>
			<br>
			<a href="https://www.linkedin.com/login" target=" ">LinkedIn</a>

		</div>	

		<div>
			<h4>Relative Links</h4>

			<a href="./attributes.html">Attributes Page</a>
			<br>
			<a href="./links.html">Links Page</a>
			<br>
			<a href="./index.html">Home Page</a>


		</div>
		
		<div>
			<br>
			<img src="./picture1.png">
			<br>
			<img src="./picture2.png">
			<br>
			<img src="./picture3.png">
			<br>
		</div>

		<!-- relative linking within the same page -->

		

	</body>

</html>
