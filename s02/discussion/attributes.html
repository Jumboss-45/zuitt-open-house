		<title>HTML - Attributes</title>
	</head>

	<body>
		<h3>HTML Attributes</h3>

		<p>HTML attributes are added to HTML tags to change or add to behaviour of an element. They are added in the opening tags of an element.</p>

		<ol type = "A">
			<!-- usually use to change the behavior of form element and ol elements -->
			<li>type</li>
			<!-- used as unique identifier of an element. -->
			<li>id</li>
			<!-- used as a unique identifier of a group element. -->
			<li>class</li>
			<!-- used to identify the address of a file to be displayed by the img tag or an external resource to add to the page. -->
			<li>src</li>
			<!-- hyperlink reference used to identify the address of another page to link using an anchor tag. -->
			<li>href</li>
		</ol>

		<!-- this is a generic container to group elements. -->
		<div>
			<!-- img tag is used to display an image in the webpage. -->
			<img src="https://i.imgur.com/Tau2zTi.png">

			<h3>Git VCS</h3>
		</div>
